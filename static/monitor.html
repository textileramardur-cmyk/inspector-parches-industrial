<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inspector de Parches · Monitor</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="app-body monitor-body">
  <header class="topbar">
    <div>
      <h1>Monitor de inspección</h1>
      <p>Vista PC · recibe datos del celular</p>
    </div>
    <div class="connect-box">
      <input id="sessionInput" maxlength="6" placeholder="ABC123" />
      <button id="btnConnect" class="btn btn-primary">Conectar</button>
    </div>
  </header>

  <main class="monitor-layout">
    <section class="monitor-status" id="monitorStatus">
      <span class="eyebrow">Resultado</span>
      <strong id="resultTitle">SIN CONEXIÓN</strong>
      <p id="resultMessage">Escribe el código de sesión del celular.</p>
    </section>

    <section class="monitor-grid">
      <article class="card big-card">
        <h2>Lectura</h2>
        <div class="metric-grid monitor-metrics">
          <div class="metric"><span>Escena</span><strong id="mScene">--</strong></div>
          <div class="metric"><span>Parche</span><strong id="mPatch">--</strong></div>
          <div class="metric"><span>Texto</span><strong id="mText">--</strong></div>
          <div class="metric"><span>Estable</span><strong id="mStable">--</strong></div>
        </div>
        <div class="readout">
          <p><span>Lateral</span><strong id="mDeltaX">--</strong></p>
          <p><span>Arriba / abajo</span><strong id="mDeltaY">--</strong></p>
          <p><span>Modo</span><strong id="mMode">--</strong></p>
          <p><span>Hora</span><strong id="mTime">--</strong></p>
        </div>
      </article>

      <article class="card diagram-card">
        <h2>Diagrama</h2>
        <canvas id="diagram" width="640" height="420"></canvas>
        <div class="legend">
          <span><i class="blue"></i> Parche</span>
          <span><i class="gray"></i> Texto esperado</span>
          <span><i class="orange"></i> Texto leído</span>
        </div>
      </article>

      <article class="card history-card">
        <h2>Últimas lecturas</h2>
        <div id="history" class="history"></div>
      </article>
    </section>
  </main>

  <script src="/static/monitor.js"></script>
</body>
</html>
