<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Captura | Inspector de Parches</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script>
    window.OPENCV_READY = false;
    window.Module = {
      onRuntimeInitialized() {
        window.OPENCV_READY = true;
        window.dispatchEvent(new Event('opencv-ready'));
      }
    };
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>
<body>
  <main class="mobile-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Inspección industrial</p>
        <h1>Captura móvil</h1>
      </div>
      <div class="session-chip" id="sessionCode">---</div>
    </header>

    <section class="camera-card">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="guide-card">
        <span>Coloca tarjeta 5×5 visible y parche dentro del área</span>
      </div>
    </section>

    <section class="status-grid">
      <article class="metric-card status" id="statusCard">
        <span>Estado</span>
        <strong id="statusText">INICIANDO</strong>
      </article>
      <article class="metric-card">
        <span>ΔX</span>
        <strong id="dxText">-- mm</strong>
      </article>
      <article class="metric-card">
        <span>ΔY</span>
        <strong id="dyText">-- mm</strong>
      </article>
      <article class="metric-card">
        <span>Ángulo</span>
        <strong id="angleText">--°</strong>
      </article>
      <article class="metric-card wide">
        <span>Score</span>
        <strong id="scoreText">--%</strong>
        <div class="bar"><i id="scoreBar"></i></div>
      </article>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>Tolerancias</h2>
        <button id="startButton" class="primary">Iniciar cámara</button>
      </div>
      <div class="control-grid">
        <label>Offset X máx. <b id="tolXLabel">3.0 mm</b><input id="tolX" type="range" min="0.5" max="10" value="3" step="0.5"></label>
        <label>Offset Y máx. <b id="tolYLabel">3.0 mm</b><input id="tolY" type="range" min="0.5" max="10" value="3" step="0.5"></label>
        <label>Ángulo máx. <b id="tolAngleLabel">5°</b><input id="tolAngle" type="range" min="1" max="15" value="5" step="1"></label>
        <label>Score mínimo <b id="minScoreLabel">85%</b><input id="minScore" type="range" min="50" max="100" value="85" step="1"></label>
      </div>
      <div class="session-row">
        <input id="manualCode" maxlength="6" placeholder="ABC123" autocomplete="off">
        <button id="connectButton" class="secondary">Conectar monitor</button>
      </div>
      <p class="hint" id="hintText">Abre <b>/monitor</b> en la PC y escribe el mismo código. Nada de QR, porque aparentemente ya sufrimos suficiente.</p>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
